services:
  - type: web
    name: ai-resume-parser
    env: python
    region: oregon
    plan: free
buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --workers 2 --timeout 120
    envVars:
      - key: GOOGLE_AI_API_KEY
        sync: false
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: resume-parser-db
          property: connectionString
      - key: PYTHON_VERSION
        value: 3.11.9

databases:
  - name: resume-parser-db
    plan: free
    region: oregon
